services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db

  backend:
    build:
      context: .
      dockerfile: packages/backend/Dockerfile
    restart: unless-stopped
    environment:
      PORT: "3001"
      MONGODB_URI: "mongodb://mongo:27017/command-tower"
      WORKSPACE_ROOT: "/workspace"
      # Allow git to operate on the mounted workspace regardless of host file ownership
      GIT_CONFIG_COUNT: "1"
      GIT_CONFIG_KEY_0: "safe.directory"
      GIT_CONFIG_VALUE_0: "/workspace"
      # Auth — set exactly one of these in .env:
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
      CLAUDE_CODE_OAUTH_TOKEN: "${CLAUDE_CODE_OAUTH_TOKEN:-}"
    volumes:
      - "${WORKSPACE_PATH:-/tmp}:/workspace"
    depends_on:
      - mongo
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3001/api/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: .
      dockerfile: packages/frontend/Dockerfile
    restart: unless-stopped
    ports:
      - "8082:8082"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  mongo_data:
